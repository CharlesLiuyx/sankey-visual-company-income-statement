<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>sankey-visual-company-income-statement</title>
    <link rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="src/app.css" />
  </head>
  <body class="boot-no-motion">
    <div class="toolbar">
      <button class="btn icon-btn" id="sidebarToggle" aria-label="Collapse dataset panel" aria-expanded="true" aria-controls="datasetPanel" title="Collapse dataset panel">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 3v18"/><path d="m16 9-3 3 3 3"/></svg>
      </button>
      <h1>sankey-visual-company-income-statement</h1>
      <div class="spacer"></div>
      <button class="btn" id="svgBtn" title="Download SVG">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>
        <span>SVG</span>
      </button>
      <button class="btn primary" id="pngBtn" title="Download PNG">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>
        <span>PNG</span>
      </button>
    </div>

    <div class="app">
      <aside class="dataset-panel" id="datasetPanel" aria-label="Dataset navigation">
        <div class="panel-head">
          <span class="eyebrow">Dataset</span>
          <div class="active-dataset" id="activeDatasetName"></div>
          <div class="active-period" id="activeDatasetPeriod"></div>
        </div>

        <section class="panel-section company-section">
          <label for="companySearch">Company</label>
          <div class="search-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
            <input id="companySearch" type="search" placeholder="Search companies" autocomplete="off" />
          </div>
          <div class="nav-list" id="companyList" role="listbox" aria-label="Companies"></div>
        </section>

        <section class="panel-section period-section">
          <div class="section-bar">
            <label for="periodSearch">Data point time</label>
            <div class="seg compact" id="periodSort" aria-label="Sort time points">
              <button data-sort="desc" class="active" title="Newest first">Desc</button>
              <button data-sort="asc" title="Oldest first">Asc</button>
            </div>
          </div>
          <div class="search-box">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
            <input id="periodSearch" type="search" placeholder="Search time points" autocomplete="off" />
          </div>
          <div class="nav-list timeline-list" id="periodList" role="listbox" aria-label="Data point times"></div>
        </section>
        <div class="sidebar-resizer" id="sidebarResizer" role="separator" aria-orientation="vertical" aria-label="Resize dataset panel" tabindex="0"></div>
      </aside>

      <main class="content">
        <div class="stage"><div class="card"><div id="chart"></div></div></div>
      </main>
    </div>

    <!-- libraries (vendored, offline) -->
    <script src="vendor/d3.min.js"></script>
    <script src="vendor/d3-sankey.min.js"></script>
    <!-- shared icons + renderers -->
    <script src="src/icons.js"></script>
    <script src="src/sankey-engine.js"></script>
    <script src="src/income-statement.js"></script>
    <!-- pure financial-statement SSOT -->
    <script src="data/income-statements.js"></script>
    <!-- datasets -->
    <script src="data/salesforce-q1-fy27.js"></script>
    <script src="data/nvidia-q1-fy27.js"></script>
    <script src="data/nvidia-q1-fy26.js"></script>
    <script src="data/nvidia-q4-fy25.js"></script>
    <script src="data/nvidia-q2-fy26.js"></script>
    <script src="data/nvidia-q3-fy26.js"></script>
    <script src="data/nvidia-q4-fy26.js"></script>

    <!-- page app (excluded from d3 verification harness) -->
    <script src="src/app.js"></script>
  </body>
</html>
